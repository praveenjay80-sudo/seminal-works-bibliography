        const MODEL = 'openai/gpt-4o';
        
        let filtered_items = [...ALL_ITEMS];

        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.trim();
            if (!key) {
                showStatus('Please enter an API key', false);
                return;
            }
            if (!key.startsWith('sk-or-v1-')) {
                showStatus('❌ Invalid key format. Must start with sk-or-v1-', false);
                return;
            }
            localStorage.setItem('openrouter_api_key', key);
            document.getElementById('apiKeyInput').value = '';
            showStatus('✅ API key saved! You can now generate bibliographies.', true);
        }

        function showStatus(msg, ok) {
            const status = document.getElementById('apiStatus');
            status.textContent = msg;
            status.className = 'api-status ' + (ok ? 'ok' : 'error');
        }

        function init() {
            const key = localStorage.getItem('openrouter_api_key');
            if (key) {
                showStatus('✅ API key loaded from storage. Ready to generate.', true);
            } else {
                showStatus('⚠️ Please enter your OpenRouter API key above', false);
            }
            render_domains();
            render_items();
        }

        function render_domains() {
            const domains = [...new Set(ALL_ITEMS.map(i => i.domain))].filter(Boolean);
            let html = '<div style="font-size: 0.85em; color: #7c8eff; margin-bottom: 12px; font-weight: bold;">DOMAINS</div>';
            
            html += `<div class="domain-item active" onclick="filter_by('all')">✓ All Items (${ALL_ITEMS.length})</div>`;
            
            domains.forEach(d => {
                const count = ALL_ITEMS.filter(i => i.domain === d).length;
                html += `<div class="domain-item" onclick="filter_by('${d}')">${d} (${count})</div>`;
            });
            
            document.getElementById('domains').innerHTML = html;
        }

        function filter_by(domain) {
            if (domain === 'all') {
                filtered_items = [...ALL_ITEMS];
            } else {
                filtered_items = ALL_ITEMS.filter(i => i.domain === domain);
            }
            document.querySelectorAll('.domain-item').forEach(d => d.classList.remove('active'));
            event.target.closest('.domain-item').classList.add('active');
            render_items();
        }

        function render_items() {
            const search = document.getElementById('searchBox').value.toLowerCase();
            let items = filtered_items;
            
            if (search) {
                items = items.filter(i => 
                    i.text.toLowerCase().includes(search) ||
                    (i.major && i.major.toLowerCase().includes(search))
                );
            }

            document.getElementById('displayedCount').textContent = items.length;
            
            if (items.length === 0) {
                document.getElementById('items').innerHTML = '<div style="color: #a0b0ff; text-align: center; padding: 40px;">No items found</div>';
                return;
            }

            let html = '';
            items.forEach((item, idx) => {
                html += `
                    <div class="item-card">
                        <div class="item-title">${item.text}</div>
                        <div class="item-meta">${item.major || item.domain || ''}</div>
                        <button class="btn-generate" onclick="generate_bibliography(event, '${item.text.replace(/'/g, "\\'")}')">
                            Generate Bibliography
                        </button>
                    </div>
                `;
            });
            
            document.getElementById('items').innerHTML = html;
        }

        async function generate_bibliography(event, title) {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Generating...';
            
            let api_key = localStorage.getItem('openrouter_api_key');
            if (!api_key) {
                btn.disabled = false;
                btn.textContent = 'Generate Bibliography';
                showStatus('❌ API key not set. Please enter your OpenRouter key above.', false);
                return;
            }

            try {
                console.log('Calling OpenRouter with model:', MODEL);
                
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + api_key,
                        'HTTP-Referer': window.location.origin
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [{
                            role: 'user',
                            content: `Generate 8-12 seminal works bibliography for: "${title}" in formal sciences. Include authors, years, and brief descriptions. Format as a numbered list with proper citations.`
                        }],
                        max_tokens: 1500,
                        temperature: 0.7
                    })
                });

                console.log('Response status:', response.status);
                const data = await response.json();
                console.log('Response:', data);
                
                if (!response.ok) {
                    const errorMsg = data.error?.message || data.error || JSON.stringify(data);
                    throw new Error(errorMsg);
                }

                if (!data.choices || !data.choices[0] || !data.choices[0].message) {
                    throw new Error('Invalid response format');
                }

                const bibliography = data.choices[0].message.content;
                showModal(title, bibliography);
            } catch (e) {
                console.error('Error:', e);
                showStatus('❌ Error: ' + e.message, false);
                alert('Error generating bibliography:\n' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Generate Bibliography';
            }
        }

        function showModal(title, content) {
            document.getElementById('modalTitle').textContent = '📖 Bibliography: ' + title;
            document.getElementById('modalBody').textContent = content;
            document.getElementById('modal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('show');
        }

        document.getElementById('searchBox').addEventListener('keyup', render_items);
        window.addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
        
        document.getElementById('apiKeyInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveApiKey();
        });
        
        init();
    </script>
